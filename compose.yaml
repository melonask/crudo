services:
  postgres:
    image: postgres:18.4-alpine3.23
    environment:
      POSTGRES_DB: crudo
      POSTGRES_USER: crudo
      POSTGRES_PASSWORD: crudo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crudo -d crudo"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql

  e2e-sqlite:
    build:
      context: .
      target: test
    environment:
      E2E_BACKEND: sqlite
      DATABASE_URL: sqlite:///tmp/crudo-e2e.db?mode=rwc
      WALLET_MNEMONIC: abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about
      WALLET_PASSPHRASE: ""

  e2e-postgres:
    build:
      context: .
      target: test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      E2E_BACKEND: postgres
      DATABASE_URL: postgres://crudo:crudo@postgres:5432/crudo
      WALLET_MNEMONIC: abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about
      WALLET_PASSPHRASE: ""
