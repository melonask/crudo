[actions.register]
sql = "INSERT INTO users (name, email, password) VALUES ($1, lower($2), $3) RETURNING id, name, email, role, balance, created_at"
params = ["name", "email", "password"]
hash = ["password"]
result = "one"
status = 201
no_store = true
[actions.register.wallets]
profiles = ["base", "solana-mainnet"]
sql = "INSERT INTO user_addresses (user_id, profile, caip2, address_index, address, derivation_path) VALUES ($1, $2, $3, 0, $4, $5)"
params = ["$result.id", "$profile.name", "$profile.caip2", "$wallet.address", "$wallet.derivation_path"]
[actions.register.wallets.values]
user_id = "$result.id"
address_index = "0"
[[actions.register.errors]]
database_message = "invalid user"
status = 422
message = "name, email, and password must not be empty"

[actions.login]
sql = { sqlite = "INSERT INTO sessions (token, user_id, expires_at) VALUES ($1, $2, unixepoch() + 86400) RETURNING token, expires_at", postgres = "INSERT INTO sessions (token, user_id, expires_at) VALUES ($1, $2, EXTRACT(EPOCH FROM clock_timestamp())::BIGINT + 86400) RETURNING token, expires_at" }
params = ["$token", "$owner"]
result = "one"
status = 201
no_store = true
[actions.me]
sql = "SELECT id, name, email, role, balance, created_at FROM users WHERE id = $1"
params = ["$owner"]
result = "one"
no_store = true
[actions.list_products]
sql = { sqlite = "SELECT id, slug, name, description, category, price, active, created_at, updated_at FROM products WHERE active = 1 ORDER BY id", postgres = "SELECT id, slug, name, description, category, price, active, created_at, updated_at FROM products WHERE active = TRUE ORDER BY id" }
result = "many"
boolean_columns = ["active"]
[actions.list_payment_methods]
sql = { sqlite = "SELECT 'exact' AS scheme, network, asset, token_name, token_version, timeout_seconds FROM exact_payment_methods WHERE active = 1 ORDER BY network, asset, token_name, token_version, id", postgres = "SELECT 'exact' AS scheme, network, asset, token_name, token_version, timeout_seconds FROM exact_payment_methods WHERE active = TRUE ORDER BY network, asset, token_name, token_version, id" }
result = "many"
[actions.list_transactions]
sql = "SELECT id, external_id, product_id, kind, status, amount, product_name, fulfillment, license_key, processed_at, created_at FROM transactions WHERE user_id = $1 ORDER BY id DESC"
params = ["$owner"]
result = "many"
no_store = true
[actions.create_top_up]
sql = { sqlite = "INSERT INTO transactions (external_id, user_id, kind, status, amount, processed_at) VALUES ($1, $2, 'top_up', 'confirmed', $3, unixepoch()) RETURNING id, external_id, kind, status, amount, processed_at, created_at", postgres = "INSERT INTO transactions (external_id, user_id, kind, status, amount) VALUES ($1, $2, 'top_up', 'confirmed', $3::BIGINT) RETURNING id, external_id, kind, status, amount, processed_at, created_at" }
params = ["external_id", "$owner", "amount"]
result = "one"
status = 201
no_store = true
[[actions.create_top_up.errors]]
database_message = "amount must be positive"
status = 422
message = "amount must be positive"
[[actions.create_top_up.errors]]
database_message = "external id must not be empty"
status = 422
message = "external_id must not be empty"

[actions.create_purchase]
sql = { sqlite = "INSERT INTO transactions (external_id, user_id, product_id, kind, status, amount, product_name, fulfillment, license_key, processed_at) SELECT $1, $2, p.id, 'purchase', 'confirmed', p.price, p.name, p.fulfillment, $3, unixepoch() FROM products AS p WHERE p.id = $4 AND p.active = 1 RETURNING id, external_id, product_id, kind, status, amount, product_name, fulfillment, license_key, processed_at, created_at", postgres = "INSERT INTO transactions (external_id, user_id, product_id, kind, status, amount, product_name, fulfillment, license_key) SELECT $1, $2, p.id, 'purchase', 'confirmed', p.price, p.name, p.fulfillment, $3 FROM products AS p WHERE p.id = $4 AND p.active = TRUE RETURNING id, external_id, product_id, kind, status, amount, product_name, fulfillment, license_key, processed_at, created_at" }
params = ["external_id", "$owner", "$token", "product_id"]
result = "one"
status = 201
no_store = true
[[actions.create_purchase.errors]]
database_message = "insufficient balance"
status = 402
message = "insufficient balance"
