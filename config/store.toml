[server]
address = "127.0.0.1:3000"
prefix = "v1"
[server.cors]
origins = ["http://127.0.0.1:8000", "http://localhost:8000", "https://demo-crudo.github.io"]
[server.limits]
body_bytes = 16384
timeout_seconds = 10
concurrency = 16
requests = 30
window_seconds = 60

[database]
url = "${DATABASE_URL}"

[database.setup.sqlite]
statements = [
  "CREATE TABLE IF NOT EXISTS users (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT NOT NULL CHECK (name <> ''), email TEXT NOT NULL COLLATE NOCASE UNIQUE CHECK (email <> ''), password TEXT NOT NULL CHECK (password <> ''), role TEXT NOT NULL DEFAULT 'customer' CHECK (role IN ('admin', 'customer')), balance INTEGER NOT NULL DEFAULT 0 CHECK (balance >= 0), created_at INTEGER NOT NULL DEFAULT (unixepoch()))",
  "CREATE TABLE IF NOT EXISTS sessions (token TEXT PRIMARY KEY CHECK (token <> ''), user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, expires_at INTEGER NOT NULL CHECK (expires_at > 0))",
  "CREATE TABLE IF NOT EXISTS user_addresses (user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, profile TEXT NOT NULL CHECK (profile IN ('base', 'solana-mainnet')), caip2 TEXT NOT NULL CHECK (caip2 IN ('eip155:8453', 'solana:5eykt4UsFv8P8NJdTREpY1vzqKqZKvdp')), address_index INTEGER NOT NULL CHECK (address_index >= 0), address TEXT NOT NULL CHECK (address <> ''), derivation_path TEXT NOT NULL CHECK (derivation_path <> ''), PRIMARY KEY (user_id, profile, address_index), UNIQUE (profile, address))",
  "CREATE TABLE IF NOT EXISTS products (id INTEGER PRIMARY KEY AUTOINCREMENT, slug TEXT NOT NULL UNIQUE CHECK (slug <> ''), name TEXT NOT NULL CHECK (name <> ''), description TEXT NOT NULL CHECK (description <> ''), category TEXT NOT NULL CHECK (category IN ('license', 'service', 'book', 'asset')), price INTEGER NOT NULL CHECK (price > 0), active INTEGER NOT NULL DEFAULT 1 CHECK (active IN (0, 1)), fulfillment TEXT NOT NULL CHECK (fulfillment <> ''), created_at INTEGER NOT NULL DEFAULT (unixepoch()), updated_at INTEGER NOT NULL DEFAULT (unixepoch()))",
  "CREATE TABLE IF NOT EXISTS transactions (id INTEGER PRIMARY KEY AUTOINCREMENT, external_id TEXT NOT NULL UNIQUE CHECK (external_id <> ''), user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE RESTRICT, product_id INTEGER REFERENCES products(id) ON DELETE RESTRICT, kind TEXT NOT NULL CHECK (kind IN ('top_up', 'purchase')), status TEXT NOT NULL CHECK (status IN ('pending', 'confirmed')), amount INTEGER NOT NULL CHECK (amount > 0), product_name TEXT, fulfillment TEXT, license_key TEXT UNIQUE, processed_at INTEGER, created_at INTEGER NOT NULL DEFAULT (unixepoch()), CHECK ((kind = 'top_up' AND product_id IS NULL AND product_name IS NULL AND fulfillment IS NULL AND license_key IS NULL) OR (kind = 'purchase' AND product_id IS NOT NULL AND product_name IS NOT NULL AND fulfillment IS NOT NULL AND license_key IS NOT NULL)))",
  "CREATE TABLE IF NOT EXISTS exact_payment_methods (id INTEGER PRIMARY KEY AUTOINCREMENT, scope TEXT NOT NULL CHECK (scope = 'GLOBAL'), network TEXT NOT NULL CHECK (network <> ''), asset TEXT NOT NULL CHECK (asset <> ''), pay_to TEXT NOT NULL CHECK (pay_to <> ''), timeout_seconds INTEGER NOT NULL CHECK (timeout_seconds > 0), token_name TEXT NOT NULL CHECK (token_name <> ''), token_version INTEGER NOT NULL CHECK (token_version > 0), active INTEGER NOT NULL DEFAULT 1 CHECK (active IN (0, 1)), UNIQUE (scope, network, asset, pay_to))",
  "CREATE INDEX IF NOT EXISTS sessions_user_id_index ON sessions (user_id)",
  "CREATE INDEX IF NOT EXISTS transactions_user_id_index ON transactions (user_id, id DESC)",
  "CREATE INDEX IF NOT EXISTS transactions_product_id_index ON transactions (product_id)",
  "CREATE TRIGGER IF NOT EXISTS transaction_process_insert AFTER INSERT ON transactions WHEN NEW.status = 'confirmed' BEGIN SELECT CASE WHEN NOT EXISTS (SELECT 1 FROM users WHERE id = NEW.user_id) THEN RAISE(ABORT, 'transaction user not found') END; UPDATE users SET balance = balance + CASE NEW.kind WHEN 'top_up' THEN NEW.amount ELSE -NEW.amount END WHERE id = NEW.user_id AND (NEW.kind = 'top_up' OR balance >= NEW.amount); SELECT CASE WHEN changes() <> 1 THEN RAISE(ABORT, 'insufficient balance') END; UPDATE transactions SET processed_at = unixepoch() WHERE id = NEW.id AND processed_at IS NULL; END",
  "CREATE TRIGGER IF NOT EXISTS transaction_process_update AFTER UPDATE OF status ON transactions WHEN NEW.status = 'confirmed' AND NEW.processed_at IS NULL BEGIN SELECT CASE WHEN NOT EXISTS (SELECT 1 FROM users WHERE id = NEW.user_id) THEN RAISE(ABORT, 'transaction user not found') END; UPDATE users SET balance = balance + CASE NEW.kind WHEN 'top_up' THEN NEW.amount ELSE -NEW.amount END WHERE id = NEW.user_id AND (NEW.kind = 'top_up' OR balance >= NEW.amount); SELECT CASE WHEN changes() <> 1 THEN RAISE(ABORT, 'insufficient balance') END; UPDATE transactions SET processed_at = unixepoch() WHERE id = NEW.id; END",
  "CREATE TRIGGER IF NOT EXISTS transaction_immutable BEFORE UPDATE ON transactions WHEN OLD.processed_at IS NOT NULL AND (NEW.external_id IS NOT OLD.external_id OR NEW.user_id IS NOT OLD.user_id OR NEW.product_id IS NOT OLD.product_id OR NEW.kind IS NOT OLD.kind OR NEW.status IS NOT OLD.status OR NEW.amount IS NOT OLD.amount OR NEW.product_name IS NOT OLD.product_name OR NEW.fulfillment IS NOT OLD.fulfillment OR NEW.license_key IS NOT OLD.license_key OR NEW.processed_at IS NOT OLD.processed_at OR NEW.created_at IS NOT OLD.created_at) BEGIN SELECT RAISE(ABORT, 'processed transaction is immutable'); END",
  "CREATE TRIGGER IF NOT EXISTS users_validate BEFORE INSERT ON users WHEN NEW.name = '' OR NEW.email = '' OR NEW.password = '' BEGIN SELECT RAISE(ABORT, 'invalid user'); END",
  "CREATE TRIGGER IF NOT EXISTS products_validate_insert BEFORE INSERT ON products WHEN NEW.slug = '' OR NEW.name = '' OR NEW.description = '' OR NEW.fulfillment = '' OR NEW.category NOT IN ('license', 'service', 'book', 'asset') OR NEW.price <= 0 BEGIN SELECT RAISE(ABORT, 'invalid product'); END",
  "CREATE TRIGGER IF NOT EXISTS products_validate_update BEFORE UPDATE ON products WHEN NEW.slug = '' OR NEW.name = '' OR NEW.description = '' OR NEW.fulfillment = '' OR NEW.category NOT IN ('license', 'service', 'book', 'asset') OR NEW.price <= 0 BEGIN SELECT RAISE(ABORT, 'invalid product'); END",
  "CREATE TRIGGER IF NOT EXISTS transactions_validate_external_id BEFORE INSERT ON transactions WHEN NEW.external_id = '' BEGIN SELECT RAISE(ABORT, 'external id must not be empty'); END",
  "CREATE TRIGGER IF NOT EXISTS transactions_validate_amount BEFORE INSERT ON transactions WHEN NEW.amount <= 0 BEGIN SELECT RAISE(ABORT, 'amount must be positive'); END",
  "CREATE TRIGGER IF NOT EXISTS transactions_validate_external_id_update BEFORE UPDATE OF external_id ON transactions WHEN NEW.external_id = '' BEGIN SELECT RAISE(ABORT, 'external id must not be empty'); END",
  "CREATE TRIGGER IF NOT EXISTS transactions_validate_amount_update BEFORE UPDATE OF amount ON transactions WHEN NEW.amount <= 0 BEGIN SELECT RAISE(ABORT, 'amount must be positive'); END"
]

[database.setup.postgres]
statements = [
  "CREATE TABLE IF NOT EXISTS users (id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY, name TEXT NOT NULL CHECK (name <> ''), email TEXT NOT NULL CHECK (email <> ''), password TEXT NOT NULL CHECK (password <> ''), role TEXT NOT NULL DEFAULT 'customer' CHECK (role IN ('admin', 'customer')), balance BIGINT NOT NULL DEFAULT 0 CHECK (balance >= 0), created_at BIGINT NOT NULL DEFAULT (EXTRACT(EPOCH FROM clock_timestamp())::BIGINT))",
  "CREATE UNIQUE INDEX IF NOT EXISTS users_email_lower_unique ON users (lower(email))",
  "CREATE TABLE IF NOT EXISTS sessions (token TEXT PRIMARY KEY CHECK (token <> ''), user_id BIGINT NOT NULL REFERENCES users(id) ON DELETE CASCADE, expires_at BIGINT NOT NULL CHECK (expires_at > 0))",
  "CREATE TABLE IF NOT EXISTS user_addresses (user_id BIGINT NOT NULL REFERENCES users(id) ON DELETE CASCADE, profile TEXT NOT NULL CHECK (profile IN ('base', 'solana-mainnet')), caip2 TEXT NOT NULL CHECK (caip2 IN ('eip155:8453', 'solana:5eykt4UsFv8P8NJdTREpY1vzqKqZKvdp')), address_index BIGINT NOT NULL CHECK (address_index >= 0), address TEXT NOT NULL CHECK (address <> ''), derivation_path TEXT NOT NULL CHECK (derivation_path <> ''), PRIMARY KEY (user_id, profile, address_index), UNIQUE (profile, address))",
  "CREATE TABLE IF NOT EXISTS products (id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY, slug TEXT NOT NULL UNIQUE CHECK (slug <> ''), name TEXT NOT NULL CHECK (name <> ''), description TEXT NOT NULL CHECK (description <> ''), category TEXT NOT NULL CHECK (category IN ('license', 'service', 'book', 'asset')), price BIGINT NOT NULL CHECK (price > 0), active BOOLEAN NOT NULL DEFAULT TRUE, fulfillment TEXT NOT NULL CHECK (fulfillment <> ''), created_at BIGINT NOT NULL DEFAULT (EXTRACT(EPOCH FROM clock_timestamp())::BIGINT), updated_at BIGINT NOT NULL DEFAULT (EXTRACT(EPOCH FROM clock_timestamp())::BIGINT))",
  "CREATE TABLE IF NOT EXISTS transactions (id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY, external_id TEXT NOT NULL UNIQUE CHECK (external_id <> ''), user_id BIGINT NOT NULL REFERENCES users(id) ON DELETE RESTRICT, product_id BIGINT REFERENCES products(id) ON DELETE RESTRICT, kind TEXT NOT NULL CHECK (kind IN ('top_up', 'purchase')), status TEXT NOT NULL CHECK (status IN ('pending', 'confirmed')), amount BIGINT NOT NULL CHECK (amount > 0), product_name TEXT, fulfillment TEXT, license_key TEXT UNIQUE, processed_at BIGINT, created_at BIGINT NOT NULL DEFAULT (EXTRACT(EPOCH FROM clock_timestamp())::BIGINT), CHECK ((kind = 'top_up' AND product_id IS NULL AND product_name IS NULL AND fulfillment IS NULL AND license_key IS NULL) OR (kind = 'purchase' AND product_id IS NOT NULL AND product_name IS NOT NULL AND fulfillment IS NOT NULL AND license_key IS NOT NULL)))",
  "CREATE TABLE IF NOT EXISTS exact_payment_methods (id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY, scope TEXT NOT NULL CHECK (scope = 'GLOBAL'), network TEXT NOT NULL CHECK (network <> ''), asset TEXT NOT NULL CHECK (asset <> ''), pay_to TEXT NOT NULL CHECK (pay_to <> ''), timeout_seconds BIGINT NOT NULL CHECK (timeout_seconds > 0), token_name TEXT NOT NULL CHECK (token_name <> ''), token_version BIGINT NOT NULL CHECK (token_version > 0), active BOOLEAN NOT NULL DEFAULT TRUE, UNIQUE (scope, network, asset, pay_to))",
  "CREATE INDEX IF NOT EXISTS sessions_user_id_index ON sessions (user_id)",
  "CREATE INDEX IF NOT EXISTS transactions_user_id_index ON transactions (user_id, id DESC)",
  "CREATE INDEX IF NOT EXISTS transactions_product_id_index ON transactions (product_id)",
  "CREATE OR REPLACE FUNCTION process_store_transaction() RETURNS TRIGGER AS $$ BEGIN IF TG_OP = 'UPDATE' AND OLD.processed_at IS NOT NULL THEN IF NEW IS DISTINCT FROM OLD THEN RAISE EXCEPTION 'processed transaction is immutable'; END IF; RETURN NEW; END IF; IF NEW.status = 'confirmed' AND NEW.processed_at IS NULL THEN IF NOT EXISTS (SELECT 1 FROM users WHERE id = NEW.user_id) THEN RAISE EXCEPTION 'transaction user not found'; END IF; UPDATE users SET balance = balance + CASE NEW.kind WHEN 'top_up' THEN NEW.amount ELSE -NEW.amount END WHERE id = NEW.user_id AND (NEW.kind = 'top_up' OR balance >= NEW.amount); IF NOT FOUND THEN RAISE EXCEPTION 'insufficient balance'; END IF; NEW.processed_at = EXTRACT(EPOCH FROM clock_timestamp())::BIGINT; END IF; RETURN NEW; END; $$ LANGUAGE plpgsql",
  "DROP TRIGGER IF EXISTS transaction_process_trigger ON transactions",
  "CREATE TRIGGER transaction_process_trigger BEFORE INSERT OR UPDATE ON transactions FOR EACH ROW EXECUTE FUNCTION process_store_transaction()",
  "DROP TRIGGER IF EXISTS users_validate_trigger ON users",
  "DROP TRIGGER IF EXISTS products_validate_trigger ON products",
  "DROP TRIGGER IF EXISTS transactions_validate_trigger ON transactions",
  "DROP FUNCTION IF EXISTS validate_store_input()",
  "CREATE OR REPLACE FUNCTION validate_store_user() RETURNS TRIGGER AS $$ BEGIN IF NEW.name = '' OR NEW.email = '' OR NEW.password = '' THEN RAISE EXCEPTION 'invalid user'; END IF; RETURN NEW; END; $$ LANGUAGE plpgsql",
  "CREATE OR REPLACE FUNCTION validate_store_product() RETURNS TRIGGER AS $$ BEGIN IF NEW.slug = '' OR NEW.name = '' OR NEW.description = '' OR NEW.fulfillment = '' OR NEW.category NOT IN ('license', 'service', 'book', 'asset') OR NEW.price <= 0 THEN RAISE EXCEPTION 'invalid product'; END IF; RETURN NEW; END; $$ LANGUAGE plpgsql",
  "CREATE OR REPLACE FUNCTION validate_store_transaction() RETURNS TRIGGER AS $$ BEGIN IF NEW.external_id = '' THEN RAISE EXCEPTION 'external id must not be empty'; ELSIF NEW.amount <= 0 THEN RAISE EXCEPTION 'amount must be positive'; END IF; RETURN NEW; END; $$ LANGUAGE plpgsql",
  "CREATE TRIGGER users_validate_trigger BEFORE INSERT OR UPDATE ON users FOR EACH ROW EXECUTE FUNCTION validate_store_user()",
  "CREATE TRIGGER products_validate_trigger BEFORE INSERT OR UPDATE ON products FOR EACH ROW EXECUTE FUNCTION validate_store_product()",
  "CREATE TRIGGER transactions_validate_trigger BEFORE INSERT OR UPDATE ON transactions FOR EACH ROW EXECUTE FUNCTION validate_store_transaction()"
]

