[auth.basic]
sql = "SELECT id, password FROM users WHERE lower(email) = lower($1)"
owner = "id"
password = "password"
[auth.bearer]
sql = { sqlite = "SELECT s.user_id, u.role FROM sessions AS s JOIN users AS u ON u.id = s.user_id WHERE s.token = $1 AND s.expires_at > unixepoch()", postgres = "SELECT s.user_id, u.role FROM sessions AS s JOIN users AS u ON u.id = s.user_id WHERE s.token = $1 AND s.expires_at > EXTRACT(EPOCH FROM clock_timestamp())::BIGINT" }
owner = "user_id"
role = "role"

[altcha]
secret = "${ALTCHA_SECRET}"
key_secret = "${ALTCHA_KEY_SECRET}"
path = "/challenge"
algorithm = "PBKDF2/SHA-256"
cost = 10000
max_number = 10000
expires_seconds = 300
bind_ip = true
[wallets]
mnemonic = "${WALLET_MNEMONIC}"
[[wallets.profiles]]
name = "base"
caip2 = "eip155:8453"
curve = "secp256k1"
derivation = "bip32"
path = "m/44'/60'/{user_id}'/0/{address_index}"
address_format = "evm"
max_addresses = 1
[[wallets.profiles]]
name = "solana-mainnet"
caip2 = "solana:5eykt4UsFv8P8NJdTREpY1vzqKqZKvdp"
curve = "ed25519"
derivation = "slip10"
path = "m/44'/501'/{user_id}'/{address_index}'"
address_format = "base58-public-key"
max_addresses = 1

