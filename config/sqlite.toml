# SQLite development configuration. PostgreSQL users should use `postgres.toml`.
[server]
# Bind to 0.0.0.0 in a container; loopback is safer for local development.
address = "127.0.0.1:3000"
# Mounted before every endpoint path, including the ALTCHA challenge path.
prefix = "v1"

[server.cors]
# Origins allowed to use the included browser console. Restrict this list in production.
origins = ["http://127.0.0.1:8000", "http://localhost:8000"]

[server.limits]
# Maximum decoded request body size in bytes.
body_bytes = 1048576
# Per-request wall-clock timeout and simultaneous request ceiling.
timeout_seconds = 30
concurrency = 100
# Requests allowed per direct client IP in each window; 0 disables rate limiting.
requests = 120
window_seconds = 60

[altcha]
path = "/challenge"
# Required independent ALTCHA secrets are supplied through the environment.
secret = "${ALTCHA_SECRET}"
key_secret = "${ALTCHA_KEY_SECRET}"
algorithm = "PBKDF2/SHA-256"
cost = 5000
max_number = 10000
expires_seconds = 300
bind_ip = true

[database]
# mode=rwc opens an existing database or creates it when absent.
url = "sqlite://crudo.db?mode=rwc"
# Idempotent setup runs atomically before the server starts.
setup = [
  """
  CREATE TABLE IF NOT EXISTS users (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    name TEXT NOT NULL,
    email TEXT NOT NULL UNIQUE,
    password TEXT NOT NULL,
    balance INTEGER NOT NULL DEFAULT 0
  )
  """,
  """
  CREATE TABLE IF NOT EXISTS user_addresses (
    user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE,
    profile TEXT NOT NULL,
    address_index INTEGER NOT NULL,
    address TEXT NOT NULL,
    derivation_path TEXT NOT NULL,
    PRIMARY KEY (user_id, profile, address_index),
    UNIQUE (profile, address),
    UNIQUE (user_id, profile, address)
  )
  """,
  """
  CREATE TABLE IF NOT EXISTS sessions (
    token TEXT PRIMARY KEY,
    user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE,
    expires_at INTEGER NOT NULL
  )
  """,
  """
  CREATE TABLE IF NOT EXISTS transactions (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    external_id TEXT NOT NULL UNIQUE,
    user_id INTEGER NOT NULL,
    profile TEXT NOT NULL,
    address TEXT NOT NULL,
    type TEXT NOT NULL,
    status TEXT NOT NULL,
    amount INTEGER NOT NULL CHECK (amount > 0),
    credited_at INTEGER,
    created_at INTEGER NOT NULL DEFAULT (unixepoch()),
    FOREIGN KEY (user_id, profile, address)
      REFERENCES user_addresses(user_id, profile, address)
  )
  """,
  """
  CREATE TRIGGER IF NOT EXISTS credit_confirmed_deposit_insert
  AFTER INSERT ON transactions
  WHEN NEW.type = 'deposit'
    AND NEW.status = 'confirmed'
    AND NEW.credited_at IS NULL
  BEGIN
    UPDATE users
    SET balance = balance + NEW.amount
    WHERE id = NEW.user_id;

    SELECT CASE WHEN changes() <> 1
      THEN RAISE(ABORT, 'deposit user not found')
    END;

    UPDATE transactions
    SET credited_at = unixepoch()
    WHERE id = NEW.id;
  END
  """,
  """
  CREATE TRIGGER IF NOT EXISTS credit_confirmed_deposit_update
  AFTER UPDATE OF status ON transactions
  WHEN NEW.type = 'deposit'
    AND NEW.status = 'confirmed'
    AND NEW.credited_at IS NULL
  BEGIN
    UPDATE users
    SET balance = balance + NEW.amount
    WHERE id = NEW.user_id;

    SELECT CASE WHEN changes() <> 1
      THEN RAISE(ABORT, 'deposit user not found')
    END;

    UPDATE transactions
    SET credited_at = unixepoch()
    WHERE id = NEW.id;
  END
  """,
  """
  CREATE TABLE IF NOT EXISTS expenses (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    external_id TEXT NOT NULL UNIQUE,
    user_id INTEGER NOT NULL,
    status TEXT NOT NULL,
    amount INTEGER NOT NULL CHECK (amount > 0),
    description TEXT,
    debited_at INTEGER,
    created_at INTEGER NOT NULL DEFAULT (unixepoch())
  )
  """,
  """
  CREATE TRIGGER IF NOT EXISTS debit_confirmed_expense_insert
  AFTER INSERT ON expenses
  WHEN NEW.status = 'confirmed'
    AND NEW.debited_at IS NULL
  BEGIN
    UPDATE users
    SET balance = balance - NEW.amount
    WHERE id = NEW.user_id
      AND balance >= NEW.amount;

    SELECT CASE WHEN changes() <> 1
      THEN RAISE(ABORT, 'expense user not found or insufficient balance')
    END;

    UPDATE expenses
    SET debited_at = unixepoch()
    WHERE id = NEW.id;
  END
  """,
  """
  CREATE TRIGGER IF NOT EXISTS debit_confirmed_expense_update
  AFTER UPDATE OF status ON expenses
  WHEN NEW.status = 'confirmed'
    AND NEW.debited_at IS NULL
  BEGIN
    UPDATE users
    SET balance = balance - NEW.amount
    WHERE id = NEW.user_id
      AND balance >= NEW.amount;

    SELECT CASE WHEN changes() <> 1
      THEN RAISE(ABORT, 'expense user not found or insufficient balance')
    END;

    UPDATE expenses
    SET debited_at = unixepoch()
    WHERE id = NEW.id;
  END
  """
]

[wallets]
mnemonic = "${WALLET_MNEMONIC}"

[[wallets.profiles]]
name = "ethereum-mainnet"
caip2 = "eip155:1"
curve = "secp256k1"
derivation = "bip32"
path = "m/44'/60'/{user_id}'/0/{address_index}"
address_format = "evm"
max_addresses = 5

[[wallets.profiles]]
name = "solana-mainnet"
caip2 = "solana:4sGjMW1sUnHzSxGspuhpqLDx6wiyjNtZ"
curve = "ed25519"
derivation = "slip10"
path = "m/44'/501'/{user_id}'/{address_index}'"
address_format = "base58-public-key"
max_addresses = 5

[[wallets.profiles]]
name = "bitcoin-mainnet"
caip2 = "bip122:000000000019d6689c085ae165831e93"
curve = "secp256k1"
derivation = "bip32"
path = "m/84'/0'/{user_id}'/0/{address_index}"
address_format = "p2wpkh"
network = "mainnet"
max_addresses = 5

[auth.basic]
# SQLite uses `?` positional placeholders and unixepoch() for Unix timestamps.
sql = "SELECT id, password FROM users WHERE email = ?"
owner = "id"
password = "password"

[auth.bearer]
sql = "SELECT user_id FROM sessions WHERE token = ? AND expires_at > unixepoch()"
owner = "user_id"

[[endpoints]]
method = "POST"
path = "/users"
action = "create_user"
altcha = true

[[endpoints]]
method = "GET"
path = "/users"
action = "list_users"

[[endpoints]]
method = "GET"
path = "/users/{id}"
action = "get_user"

[[endpoints]]
method = "POST"
path = "/tokens"
action = "create_token"
auth = ["basic"]

[[endpoints]]
method = "DELETE"
path = "/users/{id}"
action = "delete_user"
auth = ["basic", "bearer"]

[[endpoints]]
method = "GET"
path = "/transactions"
action = "list_transactions"
auth = ["bearer"]

[[endpoints]]
method = "GET"
path = "/addresses"
action = "list_addresses"
auth = ["bearer"]

[[endpoints]]
method = "POST"
path = "/addresses"
action = "create_address"
auth = ["bearer"]

[[endpoints]]
method = "POST"
path = "/transactions"
action = "create_deposit"
auth = ["bearer"]

[[endpoints]]
method = "GET"
path = "/expenses"
action = "list_expenses"
auth = ["bearer"]

[[endpoints]]
method = "POST"
path = "/expenses"
action = "create_expense"
auth = ["bearer"]

[actions.create_user]
sql = "INSERT INTO users (name, email, password) VALUES (?, ?, ?) RETURNING id, name, email"
params = ["name", "email", "password"]
hash = ["password"]
result = "one"
status = 201

[actions.create_user.wallets]
profiles = ["ethereum-mainnet", "solana-mainnet", "bitcoin-mainnet"]
sql = "INSERT INTO user_addresses (user_id, profile, address_index, address, derivation_path) VALUES (?, ?, 0, ?, ?)"
params = ["$result.id", "$profile.name", "$wallet.address", "$wallet.derivation_path"]

[actions.create_user.wallets.values]
user_id = "$result.id"
address_index = "0"

[actions.list_users]
sql = "SELECT id, name, email, balance FROM users ORDER BY id"
result = "many"

[actions.get_user]
sql = "SELECT id, name, email, balance FROM users WHERE id = ?"
params = ["id"]
result = "one"

[actions.create_token]
sql = "INSERT INTO sessions (token, user_id, expires_at) VALUES (?, ?, unixepoch() + 86400) RETURNING token"
params = ["$token", "$owner"]
result = "one"
status = 201
no_store = true

[actions.delete_user]
sql = "DELETE FROM users WHERE id = ? AND id = ? RETURNING id, name, email"
params = ["id", "$owner"]
result = "optional"

[actions.list_transactions]
sql = "SELECT id, external_id, profile, address, type, status, amount, credited_at, created_at FROM transactions WHERE user_id = ? ORDER BY id DESC"
params = ["$owner"]
result = "many"

[actions.list_addresses]
sql = "SELECT profile, address_index, address, derivation_path FROM user_addresses WHERE user_id = ? ORDER BY profile, address_index"
params = ["$owner"]
result = "many"

[actions.create_address]
sql = "INSERT INTO user_addresses (user_id, profile, address_index, address, derivation_path) SELECT ?, ?, CASE WHEN COUNT(*) < ? THEN COALESCE(MAX(address_index) + 1, 0) ELSE 0 END, ?, '' FROM user_addresses WHERE user_id = ? AND profile = ? RETURNING user_id, profile, address_index"
params = ["$owner", "$profile.name", "$profile.max_addresses", "$token", "$owner", "$profile.name"]
result = "one"
status = 201

[actions.create_address.wallets]
profile = "profile"
sql = "UPDATE user_addresses SET address = ?, derivation_path = ? WHERE user_id = ? AND profile = ? AND address_index = ?"
params = ["$wallet.address", "$wallet.derivation_path", "$result.user_id", "$profile.name", "$result.address_index"]

[actions.create_address.wallets.values]
user_id = "$result.user_id"
address_index = "$result.address_index"

[actions.create_deposit]
sql = "INSERT INTO transactions (external_id, user_id, profile, address, type, status, amount) VALUES (?, ?, ?, ?, 'deposit', 'confirmed', ?) RETURNING id, external_id, profile, address, type, status, amount, credited_at, created_at"
params = ["external_id", "$owner", "profile", "address", "amount"]
result = "one"
status = 201

[actions.list_expenses]
sql = "SELECT id, external_id, status, amount, description, debited_at, created_at FROM expenses WHERE user_id = ? ORDER BY id DESC"
params = ["$owner"]
result = "many"

[actions.create_expense]
sql = "INSERT INTO expenses (external_id, user_id, status, amount, description) VALUES (?, ?, 'confirmed', ?, ?) RETURNING id, external_id, status, amount, description, debited_at, created_at"
params = ["external_id", "$owner", "amount", "description"]
result = "one"
status = 201

[[actions.create_expense.errors]]
database_message = "expense user not found or insufficient balance"
status = 422
message = "insufficient balance"
