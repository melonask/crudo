# Local-only digital-store demo. Do not use the seeded credentials outside a demo.
[server]
address = "127.0.0.1:3000"
prefix = "v1"

[server.cors]
origins = ["http://127.0.0.1:8000", "http://localhost:8000"]

[server.limits]
body_bytes = 65536
timeout_seconds = 15
concurrency = 32
requests = 60
window_seconds = 60

[database]
# A dedicated filename prevents this demo from opening an incompatible prior schema.
url = "sqlite://crudo-store.db?mode=rwc"
# Setup is run in one transaction before serving requests.
setup = [
  "CREATE TABLE IF NOT EXISTS users (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT NOT NULL CHECK (name <> ''), email TEXT NOT NULL COLLATE NOCASE UNIQUE CHECK (email <> ''), password TEXT NOT NULL CHECK (password <> ''), role TEXT NOT NULL DEFAULT 'customer' CHECK (role IN ('admin', 'customer')), balance INTEGER NOT NULL DEFAULT 0 CHECK (balance >= 0), created_at INTEGER NOT NULL DEFAULT (unixepoch()))",
  "CREATE TABLE IF NOT EXISTS sessions (token TEXT PRIMARY KEY CHECK (token <> ''), user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, expires_at INTEGER NOT NULL CHECK (expires_at > 0))",
  "CREATE TABLE IF NOT EXISTS user_addresses (user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, profile TEXT NOT NULL CHECK (profile IN ('base', 'solana-mainnet')), caip2 TEXT NOT NULL CHECK (caip2 IN ('eip155:8453', 'solana:5eykt4UsFv8P8NJdTREpY1vzqKqZKvdp')), address_index INTEGER NOT NULL CHECK (address_index >= 0), address TEXT NOT NULL CHECK (address <> ''), derivation_path TEXT NOT NULL CHECK (derivation_path <> ''), PRIMARY KEY (user_id, profile, address_index), UNIQUE (profile, address))",
  "CREATE TABLE IF NOT EXISTS products (id INTEGER PRIMARY KEY AUTOINCREMENT, slug TEXT NOT NULL UNIQUE, name TEXT NOT NULL, description TEXT NOT NULL, category TEXT NOT NULL CHECK (category IN ('license', 'service', 'book', 'asset')), price INTEGER NOT NULL CHECK (price > 0), active INTEGER NOT NULL DEFAULT 1 CHECK (active IN (0, 1)), fulfillment TEXT NOT NULL, created_at INTEGER NOT NULL DEFAULT (unixepoch()), updated_at INTEGER NOT NULL DEFAULT (unixepoch()))",
  "CREATE TABLE IF NOT EXISTS transactions (id INTEGER PRIMARY KEY AUTOINCREMENT, external_id TEXT NOT NULL UNIQUE, user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE RESTRICT, product_id INTEGER REFERENCES products(id) ON DELETE RESTRICT, kind TEXT NOT NULL CHECK (kind IN ('top_up', 'purchase')), status TEXT NOT NULL CHECK (status IN ('pending', 'confirmed')), amount INTEGER NOT NULL CHECK (amount > 0), product_name TEXT, fulfillment TEXT, license_key TEXT UNIQUE, processed_at INTEGER, created_at INTEGER NOT NULL DEFAULT (unixepoch()), CHECK ((kind = 'top_up' AND product_id IS NULL AND product_name IS NULL AND fulfillment IS NULL AND license_key IS NULL) OR (kind = 'purchase' AND product_id IS NOT NULL AND product_name IS NOT NULL AND fulfillment IS NOT NULL AND license_key IS NOT NULL)))",
  "CREATE TABLE IF NOT EXISTS exact_payment_methods (id INTEGER PRIMARY KEY AUTOINCREMENT, scope TEXT NOT NULL CHECK (scope = 'GLOBAL'), network TEXT NOT NULL CHECK (network <> ''), asset TEXT NOT NULL CHECK (asset <> ''), pay_to TEXT NOT NULL CHECK (pay_to <> ''), timeout_seconds INTEGER NOT NULL CHECK (timeout_seconds > 0), token_name TEXT NOT NULL CHECK (token_name <> ''), token_version INTEGER NOT NULL CHECK (token_version > 0), active INTEGER NOT NULL DEFAULT 1 CHECK (active IN (0, 1)), UNIQUE (scope, network, asset, pay_to))",
  "CREATE TRIGGER IF NOT EXISTS users_validate_insert BEFORE INSERT ON users WHEN NEW.name IS NULL OR NEW.name = '' OR NEW.email IS NULL OR NEW.email = '' OR NEW.password IS NULL OR NEW.password = '' BEGIN SELECT RAISE(ABORT, 'invalid user'); END",
  "CREATE TRIGGER IF NOT EXISTS products_validate_insert BEFORE INSERT ON products WHEN NEW.slug = '' OR NEW.name = '' OR NEW.description = '' OR NEW.fulfillment = '' OR NEW.category NOT IN ('license', 'service', 'book', 'asset') OR NEW.price <= 0 OR NEW.active NOT IN (0, 1) BEGIN SELECT RAISE(ABORT, 'invalid product'); END",
  "CREATE TRIGGER IF NOT EXISTS products_validate_update BEFORE UPDATE ON products WHEN NEW.slug = '' OR NEW.name = '' OR NEW.description = '' OR NEW.fulfillment = '' OR NEW.category NOT IN ('license', 'service', 'book', 'asset') OR NEW.price <= 0 OR NEW.active NOT IN (0, 1) BEGIN SELECT RAISE(ABORT, 'invalid product'); END",
  "CREATE TRIGGER IF NOT EXISTS transactions_validate_insert BEFORE INSERT ON transactions WHEN NEW.external_id IS NULL OR NEW.external_id = '' BEGIN SELECT RAISE(ABORT, 'external id must not be empty'); END",
  "CREATE TRIGGER IF NOT EXISTS transactions_validate_amount_insert BEFORE INSERT ON transactions WHEN NEW.amount IS NULL OR NEW.amount <= 0 BEGIN SELECT RAISE(ABORT, 'amount must be positive'); END",
  "CREATE TRIGGER IF NOT EXISTS credit_confirmed_top_up_insert AFTER INSERT ON transactions WHEN NEW.kind = 'top_up' AND NEW.status = 'confirmed' AND NEW.processed_at IS NULL BEGIN UPDATE users SET balance = balance + NEW.amount WHERE id = NEW.user_id; SELECT CASE WHEN changes() <> 1 THEN RAISE(ABORT, 'top-up user not found') END; UPDATE transactions SET processed_at = unixepoch() WHERE id = NEW.id; END",
  "CREATE TRIGGER IF NOT EXISTS credit_confirmed_top_up_update AFTER UPDATE OF status ON transactions WHEN NEW.kind = 'top_up' AND NEW.status = 'confirmed' AND NEW.processed_at IS NULL BEGIN UPDATE users SET balance = balance + NEW.amount WHERE id = NEW.user_id; SELECT CASE WHEN changes() <> 1 THEN RAISE(ABORT, 'top-up user not found') END; UPDATE transactions SET processed_at = unixepoch() WHERE id = NEW.id; END",
  "CREATE TRIGGER IF NOT EXISTS debit_confirmed_purchase_insert AFTER INSERT ON transactions WHEN NEW.kind = 'purchase' AND NEW.status = 'confirmed' AND NEW.processed_at IS NULL BEGIN UPDATE users SET balance = balance - NEW.amount WHERE id = NEW.user_id AND balance >= NEW.amount; SELECT CASE WHEN changes() <> 1 THEN RAISE(ABORT, 'insufficient balance') END; UPDATE transactions SET processed_at = unixepoch() WHERE id = NEW.id; END",
  "CREATE TRIGGER IF NOT EXISTS debit_confirmed_purchase_update AFTER UPDATE OF status ON transactions WHEN NEW.kind = 'purchase' AND NEW.status = 'confirmed' AND NEW.processed_at IS NULL BEGIN UPDATE users SET balance = balance - NEW.amount WHERE id = NEW.user_id AND balance >= NEW.amount; SELECT CASE WHEN changes() <> 1 THEN RAISE(ABORT, 'insufficient balance') END; UPDATE transactions SET processed_at = unixepoch() WHERE id = NEW.id; END",
  "CREATE TRIGGER IF NOT EXISTS transactions_preserve_history BEFORE UPDATE ON transactions WHEN OLD.processed_at IS NOT NULL AND (NEW.external_id IS NOT OLD.external_id OR NEW.user_id IS NOT OLD.user_id OR NEW.product_id IS NOT OLD.product_id OR NEW.kind IS NOT OLD.kind OR NEW.status IS NOT OLD.status OR NEW.amount IS NOT OLD.amount OR NEW.product_name IS NOT OLD.product_name OR NEW.fulfillment IS NOT OLD.fulfillment OR NEW.license_key IS NOT OLD.license_key OR NEW.processed_at IS NOT OLD.processed_at OR NEW.created_at IS NOT OLD.created_at) BEGIN SELECT RAISE(ABORT, 'processed transaction is immutable'); END",
  "INSERT INTO users (name, email, password, role) VALUES ('Demo Administrator', 'admin', '$argon2id$v=19$m=19456,t=2,p=1$Ed856bd8JquN3O8a8YbBkQ$9KebavABf/1aW97pVn+LTRTeY4KFIhffpLrJxDa5xcw', 'admin') ON CONFLICT(email) DO NOTHING",
  "INSERT INTO exact_payment_methods (scope, network, asset, pay_to, timeout_seconds, token_name, token_version) VALUES ('GLOBAL', 'eip155:8453', '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', '0x9858EfFD232B4033E47d90003D41EC34EcaEda94', 60, 'USDC', 2) ON CONFLICT(scope, network, asset, pay_to) DO NOTHING",
  "INSERT INTO products (slug, name, description, category, price, fulfillment) VALUES ('macos-pro-access-code', 'macOS Pro Access Code', 'Single-user access code for the macOS Pro edition.', 'license', 4999, 'Your access code is displayed in this purchase record. Redeem it in the macOS Pro application under Account > Redeem Code.') ON CONFLICT(slug) DO NOTHING",
  "INSERT INTO products (slug, name, description, category, price, fulfillment) VALUES ('background-removal', 'Studio Background Removal', 'One high-resolution image processed with careful edge handling.', 'service', 1299, 'Upload your source image through the store support channel and include this purchase ID. Delivery is provided as a transparent PNG.') ON CONFLICT(slug) DO NOTHING",
  "INSERT INTO products (slug, name, description, category, price, fulfillment) VALUES ('practical-product-design', 'Practical Product Design', 'A digital book on planning, shipping, and maintaining small software products.', 'book', 1899, 'Your purchase record includes your personal reading access code and download instructions.') ON CONFLICT(slug) DO NOTHING",
  "INSERT INTO products (slug, name, description, category, price, fulfillment) VALUES ('architectural-planter-3d', 'Architectural Planter 3D Model', 'Production-ready low-poly planter asset with organized materials.', 'asset', 2499, 'Your purchase record includes the asset retrieval instructions and license key.') ON CONFLICT(slug) DO NOTHING"
]

[auth.basic]
sql = "SELECT id, password FROM users WHERE email = ? COLLATE NOCASE"
owner = "id"
password = "password"

[auth.bearer]
sql = "SELECT user_id FROM sessions WHERE token = ? AND expires_at > unixepoch()"
owner = "user_id"

[wallets]
mnemonic = "${WALLET_MNEMONIC}"

[[wallets.profiles]]
name = "base"
caip2 = "eip155:8453"
curve = "secp256k1"
derivation = "bip32"
path = "m/44'/60'/{user_id}'/0/{address_index}"
address_format = "evm"
max_addresses = 1

[[wallets.profiles]]
name = "solana-mainnet"
caip2 = "solana:5eykt4UsFv8P8NJdTREpY1vzqKqZKvdp"
curve = "ed25519"
derivation = "slip10"
path = "m/44'/501'/{user_id}'/{address_index}'"
address_format = "base58-public-key"
max_addresses = 1

[[endpoints]]
method = "POST"
path = "/users"
action = "register"

[endpoints.limits]
body_bytes = 4096
requests = 5
window_seconds = 60

[[endpoints]]
method = "POST"
path = "/tokens"
action = "login"
auth = ["basic"]

[endpoints.limits]
body_bytes = 1024
requests = 10
window_seconds = 60

[[endpoints]]
method = "GET"
path = "/me"
action = "me"
auth = ["bearer"]

[[endpoints]]
method = "GET"
path = "/products"
action = "list_products"

[[endpoints]]
method = "GET"
path = "/transactions"
action = "list_transactions"
auth = ["bearer"]

[[endpoints]]
method = "POST"
path = "/top-ups"
action = "create_top_up"
auth = ["bearer"]

[endpoints.limits]
body_bytes = 2048
requests = 10
window_seconds = 60

[[endpoints]]
method = "POST"
path = "/purchases"
action = "create_purchase"
auth = ["bearer"]

[endpoints.limits]
body_bytes = 2048
requests = 10
window_seconds = 60

[[endpoints]]
method = "GET"
path = "/admin/summary"
action = "admin_summary"
auth = ["bearer"]

[[endpoints]]
method = "GET"
path = "/admin/users"
action = "admin_users"
auth = ["bearer"]

[[endpoints]]
method = "GET"
path = "/admin/transactions"
action = "admin_transactions"
auth = ["bearer"]

[[endpoints]]
method = "GET"
path = "/admin/users/{id}/transactions"
action = "admin_user_transactions"
auth = ["bearer"]

[[endpoints]]
method = "GET"
path = "/admin/products"
action = "admin_products"
auth = ["bearer"]

[[endpoints]]
method = "POST"
path = "/admin/products"
action = "admin_create_product"
auth = ["bearer"]

[[endpoints]]
method = "PUT"
path = "/admin/products/{id}"
action = "admin_update_product"
auth = ["bearer"]

[[endpoints]]
method = "PUT"
path = "/admin/products/{id}/status"
action = "admin_update_product_status"
auth = ["bearer"]

[actions.register]
sql = "INSERT INTO users (name, email, password, role) VALUES (?, ?, ?, 'customer') RETURNING id, name, email, role, balance, created_at"
params = ["name", "email", "password"]
hash = ["password"]
result = "one"
status = 201
no_store = true

[actions.register.wallets]
profiles = ["base", "solana-mainnet"]
sql = "INSERT INTO user_addresses (user_id, profile, caip2, address_index, address, derivation_path) VALUES (?, ?, ?, 0, ?, ?)"
params = ["$result.id", "$profile.name", "$profile.caip2", "$wallet.address", "$wallet.derivation_path"]

[actions.register.wallets.values]
user_id = "$result.id"
address_index = "0"

[[actions.register.errors]]
database_message = "invalid user"
status = 422
message = "name, email, and password must not be empty"

[actions.login]
sql = "INSERT INTO sessions (token, user_id, expires_at) VALUES (?, ?, unixepoch() + 86400) RETURNING token, expires_at"
params = ["$token", "$owner"]
result = "one"
status = 201
no_store = true

[actions.me]
sql = "SELECT id, name, email, role, balance, created_at FROM users WHERE id = ?"
params = ["$owner"]
result = "one"
no_store = true

[actions.list_products]
sql = "SELECT id, slug, name, description, category, price, active, created_at, updated_at FROM products WHERE active = 1 ORDER BY id"
result = "many"

[actions.list_transactions]
sql = "SELECT id, external_id, product_id, kind, status, amount, product_name, fulfillment, license_key, processed_at, created_at FROM transactions WHERE user_id = ? ORDER BY id DESC"
params = ["$owner"]
result = "many"
no_store = true

[actions.create_top_up]
# Demo credit only: this endpoint performs no payment-provider verification.
sql = "INSERT INTO transactions (external_id, user_id, kind, status, amount) VALUES (?, ?, 'top_up', 'confirmed', ?) RETURNING id, external_id, kind, status, amount, processed_at, created_at"
params = ["external_id", "$owner", "amount"]
result = "one"
status = 201
no_store = true

[[actions.create_top_up.errors]]
database_message = "amount must be positive"
status = 422
message = "amount must be positive"

[[actions.create_top_up.errors]]
database_message = "external id must not be empty"
status = 422
message = "external_id must not be empty"

[actions.create_purchase]
sql = "INSERT INTO transactions (external_id, user_id, product_id, kind, status, amount, product_name, fulfillment, license_key) SELECT ?, ?, p.id, 'purchase', 'confirmed', p.price, p.name, p.fulfillment, ? FROM products AS p WHERE p.id = ? AND p.active = 1 RETURNING id, external_id, product_id, kind, status, amount, product_name, fulfillment, license_key, processed_at, created_at"
params = ["external_id", "$owner", "$token", "product_id"]
result = "one"
status = 201
no_store = true

[[actions.create_purchase.errors]]
database_message = "insufficient balance"
status = 402
message = "insufficient balance"

[actions.create_purchase.errors.x402]
sql = "WITH product AS (SELECT price FROM products WHERE id = ? AND active = 1), accepts AS (SELECT COALESCE(json_group_array(json_object('scheme', 'exact', 'network', m.network, 'amount', CAST(p.price * 10000 AS TEXT), 'asset', m.asset, 'payTo', m.pay_to, 'maxTimeoutSeconds', m.timeout_seconds, 'extra', json_object('name', m.token_name, 'version', CAST(m.token_version AS TEXT)))), '[]') AS value FROM exact_payment_methods AS m CROSS JOIN product AS p WHERE m.scope = 'GLOBAL' AND m.active = 1), destinations AS (SELECT COALESCE(json_group_array(json_object('network', a.caip2, 'asset', CASE WHEN a.caip2 = 'eip155:8453' THEN '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913' WHEN a.caip2 = 'solana:5eykt4UsFv8P8NJdTREpY1vzqKqZKvdp' THEN 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v' END, 'payTo', a.address, 'minAmount', CAST(p.price * 10000 AS TEXT))), '[]') AS value FROM user_addresses AS a CROSS JOIN product AS p WHERE a.user_id = ?) SELECT json_object('x402Version', 2, 'error', 'insufficient balance', 'resource', json_object('url', 'http://127.0.0.1:3000/v1/purchases', 'description', 'Purchase the requested digital-store product with USDC.', 'mimeType', 'application/json'), 'accepts', json(accepts.value), 'extensions', json_object('deposit', json_object('info', json_object('uid', CAST(? AS TEXT), 'destinations', json(destinations.value)), 'schema', json_object('$schema', 'https://json-schema.org/draft/2020-12/schema', 'type', 'object', 'required', json_array('uid', 'destinations'), 'additionalProperties', json('false'), 'properties', json_object('uid', json_object('type', 'string'), 'destinations', json_object('type', 'array', 'items', json_object('type', 'object', 'required', json_array('network', 'asset', 'payTo', 'minAmount'), 'additionalProperties', json('false'), 'properties', json_object('network', json_object('type', 'string'), 'asset', json_object('type', 'string'), 'payTo', json_object('type', 'string'), 'minAmount', json_object('type', 'string'))))))))) AS payment_required FROM accepts CROSS JOIN destinations"
params = ["product_id", "$owner", "$owner"]
column = "payment_required"

[[actions.create_purchase.errors]]
database_message = "external id must not be empty"
status = 422
message = "external_id must not be empty"

[actions.admin_summary]
sql = "SELECT u.balance AS user_count, u.balance AS customer_count, u.balance AS product_count, u.balance AS transaction_count, u.balance AS total_balances, u.balance AS total_topups, u.balance AS total_sales FROM users AS u WHERE 0 UNION ALL SELECT (SELECT COUNT(*) FROM users), (SELECT COUNT(*) FROM users WHERE role = 'customer'), (SELECT COUNT(*) FROM products), (SELECT COUNT(*) FROM transactions), (SELECT COALESCE(SUM(balance), 0) FROM users), (SELECT COALESCE(SUM(amount), 0) FROM transactions WHERE kind = 'top_up' AND status = 'confirmed'), (SELECT COALESCE(SUM(amount), 0) FROM transactions WHERE kind = 'purchase' AND status = 'confirmed') WHERE EXISTS (SELECT 1 FROM users WHERE id = ? AND role = 'admin')"
params = ["$owner"]
result = "optional"
no_store = true

[actions.admin_users]
sql = "SELECT id, name, email, role, balance, created_at FROM users WHERE EXISTS (SELECT 1 FROM users WHERE id = ? AND role = 'admin') ORDER BY id"
params = ["$owner"]
result = "many"
no_store = true

[actions.admin_transactions]
sql = "SELECT t.id, t.external_id, t.user_id, u.name AS user_name, u.email AS user_email, t.product_id, t.kind, t.status, t.amount, t.product_name, t.fulfillment, t.license_key, t.processed_at, t.created_at FROM transactions AS t JOIN users AS u ON u.id = t.user_id WHERE EXISTS (SELECT 1 FROM users WHERE id = ? AND role = 'admin') ORDER BY t.id DESC"
params = ["$owner"]
result = "many"
no_store = true

[actions.admin_user_transactions]
sql = "SELECT t.id, t.external_id, t.user_id, u.name AS user_name, u.email AS user_email, t.product_id, t.kind, t.status, t.amount, t.product_name, t.fulfillment, t.license_key, t.processed_at, t.created_at FROM transactions AS t JOIN users AS u ON u.id = t.user_id WHERE t.user_id = ? AND EXISTS (SELECT 1 FROM users WHERE id = ? AND role = 'admin') ORDER BY t.id DESC"
params = ["id", "$owner"]
result = "many"
no_store = true

[actions.admin_products]
sql = "SELECT id, slug, name, description, category, price, active, fulfillment, created_at, updated_at FROM products WHERE EXISTS (SELECT 1 FROM users WHERE id = ? AND role = 'admin') ORDER BY id"
params = ["$owner"]
result = "many"
no_store = true

[actions.admin_create_product]
sql = "INSERT INTO products (slug, name, description, category, price, fulfillment) SELECT ?, ?, ?, ?, ?, ? WHERE EXISTS (SELECT 1 FROM users WHERE id = ? AND role = 'admin') RETURNING id, slug, name, description, category, price, active, fulfillment, created_at, updated_at"
params = ["slug", "name", "description", "category", "price", "fulfillment", "$owner"]
result = "optional"
status = 201
no_store = true

[[actions.admin_create_product.errors]]
database_message = "invalid product"
status = 422
message = "invalid product"

[actions.admin_update_product]
sql = "UPDATE products SET slug = ?, name = ?, description = ?, category = ?, price = ?, fulfillment = ?, updated_at = unixepoch() WHERE id = ? AND EXISTS (SELECT 1 FROM users WHERE id = ? AND role = 'admin') RETURNING id, slug, name, description, category, price, active, fulfillment, created_at, updated_at"
params = ["slug", "name", "description", "category", "price", "fulfillment", "id", "$owner"]
result = "optional"
no_store = true

[[actions.admin_update_product.errors]]
database_message = "invalid product"
status = 422
message = "invalid product"

[actions.admin_update_product_status]
sql = "UPDATE products SET active = ?, updated_at = unixepoch() WHERE id = ? AND EXISTS (SELECT 1 FROM users WHERE id = ? AND role = 'admin') RETURNING id, slug, name, description, category, price, active, fulfillment, created_at, updated_at"
params = ["active", "id", "$owner"]
result = "optional"
no_store = true

[[actions.admin_update_product_status.errors]]
database_message = "invalid product"
status = 422
message = "invalid product"
