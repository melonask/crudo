# PostgreSQL production-style configuration. SQL differs from SQLite by design.
[server]
# Containers must bind all interfaces to receive published traffic.
address = "0.0.0.0:3000"
prefix = "v1"

[server.cors]
# Origins allowed to use the included browser console. Restrict this list in production.
origins = ["http://127.0.0.1:8000", "http://localhost:8000"]

[server.limits]
# Defaults inherited by endpoints unless overridden in `endpoints.limits`.
body_bytes = 1048576
timeout_seconds = 30
concurrency = 100
# Requests per direct client IP per fixed window; 0 disables this limit.
requests = 120
window_seconds = 60

[altcha]
path = "/challenge"
# Always replace both values through environment expansion in production.
secret = "development-only-change-me"
key_secret = "development-key-only-change-me"
algorithm = "PBKDF2/SHA-256"
cost = 5000
max_number = 10000
expires_seconds = 300
# Disable only when clients legitimately change address while solving a challenge.
bind_ip = true

[database]
# Docker Compose supplies this variable; use a TLS-enabled URL in production.
url = "${DATABASE_URL}"
# Idempotent setup runs atomically before the server starts.
setup = [
  """
  CREATE TABLE IF NOT EXISTS users (
    id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
    name TEXT NOT NULL,
    email TEXT NOT NULL UNIQUE,
    password TEXT NOT NULL,
    balance BIGINT NOT NULL DEFAULT 0
  )
  """,
  """
  CREATE TABLE IF NOT EXISTS user_addresses (
    user_id BIGINT NOT NULL REFERENCES users(id) ON DELETE CASCADE,
    profile TEXT NOT NULL,
    address_index BIGINT NOT NULL,
    address TEXT NOT NULL,
    derivation_path TEXT NOT NULL,
    PRIMARY KEY (user_id, profile, address_index),
    UNIQUE (profile, address),
    UNIQUE (user_id, profile, address)
  )
  """,
  """
  CREATE TABLE IF NOT EXISTS wallet_counters (
    user_id BIGINT NOT NULL REFERENCES users(id) ON DELETE CASCADE,
    profile TEXT NOT NULL,
    address_index BIGINT NOT NULL,
    PRIMARY KEY (user_id, profile)
  )
  """,
  """
  CREATE TABLE IF NOT EXISTS sessions (
    token TEXT PRIMARY KEY,
    user_id BIGINT NOT NULL REFERENCES users(id) ON DELETE CASCADE,
    expires_at BIGINT NOT NULL
  )
  """,
  """
  CREATE TABLE IF NOT EXISTS transactions (
    id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
    external_id TEXT NOT NULL UNIQUE,
    user_id BIGINT NOT NULL REFERENCES users(id),
    profile TEXT NOT NULL,
    address TEXT NOT NULL,
    type TEXT NOT NULL,
    status TEXT NOT NULL,
    amount BIGINT NOT NULL CHECK (amount > 0),
    credited_at BIGINT,
    created_at BIGINT NOT NULL DEFAULT (EXTRACT(EPOCH FROM clock_timestamp())::BIGINT),
    FOREIGN KEY (user_id, profile, address)
      REFERENCES user_addresses(user_id, profile, address)
  )
  """,
  """
  CREATE OR REPLACE FUNCTION credit_confirmed_deposit() RETURNS TRIGGER AS $$
  BEGIN
    IF NEW.type = 'deposit' AND NEW.status = 'confirmed' AND NEW.credited_at IS NULL THEN
      UPDATE users SET balance = balance + NEW.amount WHERE id = NEW.user_id;
      IF NOT FOUND THEN
        RAISE EXCEPTION 'deposit user not found';
      END IF;
      NEW.credited_at = EXTRACT(EPOCH FROM clock_timestamp())::BIGINT;
    END IF;
    RETURN NEW;
  END;
  $$ LANGUAGE plpgsql
  """,
  "DROP TRIGGER IF EXISTS credit_confirmed_deposit_trigger ON transactions",
  """
  CREATE TRIGGER credit_confirmed_deposit_trigger
  BEFORE INSERT OR UPDATE OF status ON transactions
  FOR EACH ROW EXECUTE FUNCTION credit_confirmed_deposit()
  """,
  """
  CREATE TABLE IF NOT EXISTS expenses (
    id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
    external_id TEXT NOT NULL UNIQUE,
    user_id BIGINT NOT NULL REFERENCES users(id),
    status TEXT NOT NULL,
    amount BIGINT NOT NULL CHECK (amount > 0),
    description TEXT,
    debited_at BIGINT,
    created_at BIGINT NOT NULL DEFAULT (EXTRACT(EPOCH FROM clock_timestamp())::BIGINT)
  )
  """,
  """
  CREATE OR REPLACE FUNCTION debit_confirmed_expense() RETURNS TRIGGER AS $$
  BEGIN
    IF NEW.status = 'confirmed' AND NEW.debited_at IS NULL THEN
      UPDATE users
      SET balance = balance - NEW.amount
      WHERE id = NEW.user_id AND balance >= NEW.amount;
      IF NOT FOUND THEN
        RAISE EXCEPTION 'expense user not found or insufficient balance';
      END IF;
      NEW.debited_at = EXTRACT(EPOCH FROM clock_timestamp())::BIGINT;
    END IF;
    RETURN NEW;
  END;
  $$ LANGUAGE plpgsql
  """,
  "DROP TRIGGER IF EXISTS debit_confirmed_expense_trigger ON expenses",
  """
  CREATE TRIGGER debit_confirmed_expense_trigger
  BEFORE INSERT OR UPDATE OF status ON expenses
  FOR EACH ROW EXECUTE FUNCTION debit_confirmed_expense()
  """
]

[wallets]
mnemonic = "${WALLET_MNEMONIC}"
passphrase = "${WALLET_PASSPHRASE}"

[[wallets.profiles]]
name = "ethereum-mainnet"
caip2 = "eip155:1"
curve = "secp256k1"
derivation = "bip32"
path = "m/44'/60'/{user_id}'/0/{address_index}"
address_format = "evm"
max_addresses = 5

[[wallets.profiles]]
name = "solana-mainnet"
caip2 = "solana:4sGjMW1sUnHzSxGspuhpqLDx6wiyjNtZ"
curve = "ed25519"
derivation = "slip10"
path = "m/44'/501'/{user_id}'/{address_index}'"
address_format = "base58-public-key"
max_addresses = 5

[[wallets.profiles]]
name = "bitcoin-mainnet"
caip2 = "bip122:000000000019d6689c085ae165831e93"
curve = "secp256k1"
derivation = "bip32"
path = "m/84'/0'/{user_id}'/0/{address_index}"
address_format = "p2wpkh"
network = "mainnet"
max_addresses = 5

[auth.basic]
# PostgreSQL uses numbered placeholders and EXTRACT(EPOCH ...) timestamps.
sql = "SELECT id, password FROM users WHERE email = $1"
owner = "id"
password = "password"

[auth.bearer]
sql = "SELECT user_id FROM sessions WHERE token = $1 AND expires_at > EXTRACT(EPOCH FROM now())"
owner = "user_id"

[[endpoints]]
method = "POST"
path = "/users"
action = "create_user"
altcha = true

[[endpoints]]
method = "GET"
path = "/users"
action = "list_users"

[[endpoints]]
method = "GET"
path = "/users/{id}"
action = "get_user"

[[endpoints]]
method = "POST"
path = "/tokens"
action = "create_token"
auth = ["basic"]

[[endpoints]]
method = "DELETE"
path = "/users/{id}"
action = "delete_user"
auth = ["basic", "bearer"]

[[endpoints]]
method = "GET"
path = "/transactions"
action = "list_transactions"
auth = ["bearer"]

[[endpoints]]
method = "GET"
path = "/addresses"
action = "list_addresses"
auth = ["bearer"]

[[endpoints]]
method = "POST"
path = "/addresses"
action = "create_address"
auth = ["bearer"]

[[endpoints]]
method = "POST"
path = "/transactions"
action = "create_deposit"
auth = ["bearer"]

[[endpoints]]
method = "GET"
path = "/expenses"
action = "list_expenses"
auth = ["bearer"]

[[endpoints]]
method = "POST"
path = "/expenses"
action = "create_expense"
auth = ["bearer"]

[actions.create_user]
sql = "INSERT INTO users (name, email, password) VALUES ($1, $2, $3) RETURNING id, name, email"
params = ["name", "email", "password"]
hash = ["password"]
result = "one"
status = 201

[actions.create_user.wallets]
profiles = ["ethereum-mainnet", "solana-mainnet", "bitcoin-mainnet"]
sql = "INSERT INTO user_addresses (user_id, profile, address_index, address, derivation_path) VALUES ($1, $2, 0, $3, $4)"
params = ["$result.id", "$profile.name", "$wallet.address", "$wallet.derivation_path"]

[actions.create_user.wallets.values]
user_id = "$result.id"
address_index = "0"

[actions.list_users]
sql = "SELECT id, name, email, balance FROM users ORDER BY id"
result = "many"

[actions.get_user]
# HTTP path/query parameters are strings, so numeric PostgreSQL columns need an explicit cast.
sql = "SELECT id, name, email, balance FROM users WHERE id = $1::BIGINT"
params = ["id"]
result = "one"

[actions.create_token]
sql = "INSERT INTO sessions (token, user_id, expires_at) VALUES ($1, $2, EXTRACT(EPOCH FROM now()) + 86400) RETURNING token"
params = ["$token", "$owner"]
result = "one"
status = 201
no_store = true

[actions.delete_user]
sql = "DELETE FROM users WHERE id = $1::BIGINT AND id = $2 RETURNING id, name, email"
params = ["id", "$owner"]
result = "optional"

[actions.list_transactions]
sql = "SELECT id, external_id, profile, address, type, status, amount, credited_at, created_at FROM transactions WHERE user_id = $1 ORDER BY id DESC"
params = ["$owner"]
result = "many"

[actions.list_addresses]
sql = "SELECT profile, address_index, address, derivation_path FROM user_addresses WHERE user_id = $1 ORDER BY profile, address_index"
params = ["$owner"]
result = "many"

[actions.create_address]
sql = "WITH allocated AS (INSERT INTO wallet_counters (user_id, profile, address_index) VALUES ($1, $2, CASE WHEN EXISTS (SELECT 1 FROM user_addresses WHERE user_id = $1 AND profile = $2) AND $3 > 1 THEN 1 ELSE 0 END) ON CONFLICT (user_id, profile) DO UPDATE SET address_index = CASE WHEN wallet_counters.address_index < $3 - 1 THEN wallet_counters.address_index + 1 ELSE 0 END RETURNING address_index) INSERT INTO user_addresses (user_id, profile, address_index, address, derivation_path) SELECT $1, $2, address_index, $4, '' FROM allocated RETURNING user_id, profile, address_index"
params = ["$owner", "$profile.name", "$profile.max_addresses", "$token"]
result = "one"
status = 201

[actions.create_address.wallets]
profile = "profile"
sql = "UPDATE user_addresses SET address = $1, derivation_path = $2 WHERE user_id = $3 AND profile = $4 AND address_index = $5"
params = ["$wallet.address", "$wallet.derivation_path", "$result.user_id", "$profile.name", "$result.address_index"]

[actions.create_address.wallets.values]
user_id = "$result.user_id"
address_index = "$result.address_index"

[actions.create_deposit]
sql = "INSERT INTO transactions (external_id, user_id, profile, address, type, status, amount) VALUES ($1, $2, $3, $4, 'deposit', 'confirmed', $5::BIGINT) RETURNING id, external_id, profile, address, type, status, amount, credited_at, created_at"
params = ["external_id", "$owner", "profile", "address", "amount"]
result = "one"
status = 201

[actions.list_expenses]
sql = "SELECT id, external_id, status, amount, description, debited_at, created_at FROM expenses WHERE user_id = $1 ORDER BY id DESC"
params = ["$owner"]
result = "many"

[actions.create_expense]
sql = "INSERT INTO expenses (external_id, user_id, status, amount, description) VALUES ($1, $2, 'confirmed', $3::BIGINT, $4) RETURNING id, external_id, status, amount, description, debited_at, created_at"
params = ["external_id", "$owner", "amount", "description"]
result = "one"
status = 201

[[actions.create_expense.errors]]
database_message = "expense user not found or insufficient balance"
status = 422
message = "insufficient balance"
