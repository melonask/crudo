# PostgreSQL digital-store demo. Use TLS and tighter network controls in production.
[server]
address = "0.0.0.0:3000"
prefix = "v1"

[server.cors]
origins = ["http://127.0.0.1:8000", "http://localhost:8000"]

[server.limits]
body_bytes = 65536
timeout_seconds = 15
concurrency = 32
requests = 60
window_seconds = 60

[database]
url = "${DATABASE_URL}"
# Setup is run atomically before serving requests.
setup = [
  """
  CREATE TABLE IF NOT EXISTS users (
    id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
    name TEXT NOT NULL,
    email TEXT NOT NULL,
    password TEXT NOT NULL,
    role TEXT NOT NULL DEFAULT 'customer' CHECK (role IN ('admin', 'customer')),
    balance BIGINT NOT NULL DEFAULT 0 CHECK (balance >= 0),
    created_at BIGINT NOT NULL DEFAULT (EXTRACT(EPOCH FROM clock_timestamp())::BIGINT)
  )
  """,
  "CREATE UNIQUE INDEX IF NOT EXISTS users_email_lower_unique ON users (lower(email))",
  """
  CREATE TABLE IF NOT EXISTS sessions (
    token TEXT PRIMARY KEY,
    user_id BIGINT NOT NULL REFERENCES users(id) ON DELETE CASCADE,
    expires_at BIGINT NOT NULL
  )
  """,
  """
  CREATE TABLE IF NOT EXISTS products (
    id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
    slug TEXT NOT NULL UNIQUE,
    name TEXT NOT NULL,
    description TEXT NOT NULL,
    category TEXT NOT NULL CHECK (category IN ('license', 'service', 'book', 'asset')),
    price BIGINT NOT NULL CHECK (price > 0),
    fulfillment TEXT NOT NULL,
    active BOOLEAN NOT NULL DEFAULT TRUE,
    created_at BIGINT NOT NULL DEFAULT (EXTRACT(EPOCH FROM clock_timestamp())::BIGINT),
    updated_at BIGINT NOT NULL DEFAULT (EXTRACT(EPOCH FROM clock_timestamp())::BIGINT)
  )
  """,
  """
  CREATE TABLE IF NOT EXISTS transactions (
    id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
    external_id TEXT NOT NULL UNIQUE,
    user_id BIGINT NOT NULL REFERENCES users(id),
    product_id BIGINT REFERENCES products(id),
    kind TEXT NOT NULL CHECK (kind IN ('top_up', 'purchase')),
    status TEXT NOT NULL CHECK (status IN ('pending', 'confirmed')),
    amount BIGINT NOT NULL CONSTRAINT transactions_amount_positive CHECK (amount > 0),
    product_name TEXT,
    fulfillment TEXT,
    license_key TEXT UNIQUE,
    processed_at BIGINT,
    created_at BIGINT NOT NULL DEFAULT (EXTRACT(EPOCH FROM clock_timestamp())::BIGINT),
    CHECK (
      (kind = 'top_up' AND product_id IS NULL AND product_name IS NULL AND fulfillment IS NULL AND license_key IS NULL)
      OR
      (kind = 'purchase' AND product_id IS NOT NULL AND product_name IS NOT NULL AND fulfillment IS NOT NULL AND license_key IS NOT NULL)
    )
  )
  """,
  "CREATE INDEX IF NOT EXISTS sessions_user_id_index ON sessions (user_id)",
  "CREATE INDEX IF NOT EXISTS transactions_user_id_index ON transactions (user_id, id DESC)",
  "CREATE INDEX IF NOT EXISTS transactions_product_id_index ON transactions (product_id)",
  """
  CREATE OR REPLACE FUNCTION require_admin(p_user_id BIGINT) RETURNS BOOLEAN AS $$
  BEGIN
    IF NOT EXISTS (SELECT 1 FROM users WHERE id = p_user_id AND role = 'admin') THEN
      RAISE EXCEPTION 'administrator privileges required';
    END IF;
    RETURN TRUE;
  END;
  $$ LANGUAGE plpgsql
  """,
  """
  CREATE OR REPLACE FUNCTION validate_store_product() RETURNS TRIGGER AS $$
  BEGIN
    IF NEW.slug = '' OR NEW.name = '' OR NEW.description = '' OR NEW.fulfillment = ''
      OR NEW.category NOT IN ('license', 'service', 'book', 'asset') OR NEW.price <= 0 THEN
      RAISE EXCEPTION 'invalid product';
    END IF;
    RETURN NEW;
  END;
  $$ LANGUAGE plpgsql
  """,
  "DROP TRIGGER IF EXISTS validate_store_product_trigger ON products",
  "CREATE TRIGGER validate_store_product_trigger BEFORE INSERT OR UPDATE ON products FOR EACH ROW EXECUTE FUNCTION validate_store_product()",
  """
  CREATE OR REPLACE FUNCTION validate_transaction_amount() RETURNS TRIGGER AS $$
  BEGIN
    IF NEW.amount <= 0 THEN
      RAISE EXCEPTION 'amount must be positive';
    END IF;
    RETURN NEW;
  END;
  $$ LANGUAGE plpgsql
  """,
  "DROP TRIGGER IF EXISTS validate_transaction_amount_trigger ON transactions",
  "CREATE TRIGGER validate_transaction_amount_trigger BEFORE INSERT OR UPDATE ON transactions FOR EACH ROW EXECUTE FUNCTION validate_transaction_amount()",
  """
  CREATE OR REPLACE FUNCTION process_confirmed_transaction() RETURNS TRIGGER AS $$
  BEGIN
    IF TG_OP = 'UPDATE' AND OLD.processed_at IS NOT NULL THEN
      IF NEW.external_id IS DISTINCT FROM OLD.external_id
        OR NEW.user_id IS DISTINCT FROM OLD.user_id
        OR NEW.product_id IS DISTINCT FROM OLD.product_id
        OR NEW.kind IS DISTINCT FROM OLD.kind
        OR NEW.status IS DISTINCT FROM OLD.status
        OR NEW.amount IS DISTINCT FROM OLD.amount
        OR NEW.product_name IS DISTINCT FROM OLD.product_name
        OR NEW.fulfillment IS DISTINCT FROM OLD.fulfillment
        OR NEW.license_key IS DISTINCT FROM OLD.license_key
        OR NEW.created_at IS DISTINCT FROM OLD.created_at
        OR NEW.processed_at IS DISTINCT FROM OLD.processed_at THEN
        RAISE EXCEPTION 'processed transaction is immutable';
      END IF;
      RETURN NEW;
    END IF;

    IF NEW.status = 'confirmed' AND NEW.processed_at IS NULL THEN
      IF NEW.kind = 'top_up' THEN
        UPDATE users SET balance = balance + NEW.amount WHERE id = NEW.user_id;
        IF NOT FOUND THEN
          RAISE EXCEPTION 'transaction user not found';
        END IF;
      ELSIF NEW.kind = 'purchase' THEN
        UPDATE users
        SET balance = balance - NEW.amount
        WHERE id = NEW.user_id AND balance >= NEW.amount;
        IF NOT FOUND THEN
          RAISE EXCEPTION 'insufficient balance';
        END IF;
      END IF;
      NEW.processed_at = EXTRACT(EPOCH FROM clock_timestamp())::BIGINT;
    END IF;
    RETURN NEW;
  END;
  $$ LANGUAGE plpgsql
  """,
  "DROP TRIGGER IF EXISTS process_confirmed_transaction_trigger ON transactions",
  """
  CREATE TRIGGER process_confirmed_transaction_trigger
  BEFORE INSERT OR UPDATE ON transactions
  FOR EACH ROW EXECUTE FUNCTION process_confirmed_transaction()
  """,
  # Demo-only credentials: admin / admin. Change or remove before deployment.
  """
  INSERT INTO users (name, email, password, role)
  VALUES ('Demo Administrator', 'admin', '$argon2id$v=19$m=19456,t=2,p=1$Ed856bd8JquN3O8a8YbBkQ$9KebavABf/1aW97pVn+LTRTeY4KFIhffpLrJxDa5xcw', 'admin')
  ON CONFLICT DO NOTHING
  """,
  """
  INSERT INTO products (slug, name, description, category, price, fulfillment, active)
  VALUES
    ('macos-pro-access-code', 'macOS Pro Access Code', 'Single-user access code for the macOS Pro edition.', 'license', 4999, 'Your access code is displayed in this purchase record. Redeem it in the macOS Pro application under Account > Redeem Code.', TRUE),
    ('background-removal', 'Studio Background Removal', 'One high-resolution image processed with careful edge handling.', 'service', 1299, 'Upload your source image through the store support channel and include this purchase ID. Delivery is provided as a transparent PNG.', TRUE),
    ('practical-product-design', 'Practical Product Design', 'A digital book on planning, shipping, and maintaining small software products.', 'book', 1899, 'Your purchase record includes your personal reading access code and download instructions.', TRUE),
    ('architectural-planter-3d', 'Architectural Planter 3D Model', 'Production-ready low-poly planter asset with organized materials.', 'asset', 2499, 'Your purchase record includes the asset retrieval instructions and license key.', TRUE)
  ON CONFLICT DO NOTHING
  """
]

[auth.basic]
sql = "SELECT id, password FROM users WHERE lower(email) = lower($1)"
owner = "id"
password = "password"

[auth.bearer]
sql = "SELECT user_id FROM sessions WHERE token = $1 AND expires_at > EXTRACT(EPOCH FROM clock_timestamp())::BIGINT"
owner = "user_id"

[[endpoints]]
method = "POST"
path = "/users"
action = "register"
limits = { body_bytes = 4096, requests = 5, window_seconds = 60 }

[[endpoints]]
method = "POST"
path = "/tokens"
action = "login"
auth = ["basic"]
limits = { body_bytes = 1024, requests = 10, window_seconds = 60 }

[[endpoints]]
method = "GET"
path = "/me"
action = "me"
auth = ["bearer"]

[[endpoints]]
method = "GET"
path = "/products"
action = "list_products"

[[endpoints]]
method = "GET"
path = "/transactions"
action = "list_transactions"
auth = ["bearer"]

[[endpoints]]
method = "POST"
path = "/top-ups"
action = "create_top_up"
auth = ["bearer"]
limits = { body_bytes = 2048, requests = 10, window_seconds = 60 }

[[endpoints]]
method = "POST"
path = "/purchases"
action = "create_purchase"
auth = ["bearer"]
limits = { body_bytes = 2048, requests = 10, window_seconds = 60 }

[[endpoints]]
method = "GET"
path = "/admin/summary"
action = "admin_summary"
auth = ["bearer"]

[[endpoints]]
method = "GET"
path = "/admin/users"
action = "admin_users"
auth = ["bearer"]

[[endpoints]]
method = "GET"
path = "/admin/transactions"
action = "admin_transactions"
auth = ["bearer"]

[[endpoints]]
method = "GET"
path = "/admin/users/{id}/transactions"
action = "admin_user_transactions"
auth = ["bearer"]

[[endpoints]]
method = "GET"
path = "/admin/products"
action = "admin_products"
auth = ["bearer"]

[[endpoints]]
method = "POST"
path = "/admin/products"
action = "admin_create_product"
auth = ["bearer"]

[[endpoints]]
method = "PUT"
path = "/admin/products/{id}"
action = "admin_update_product"
auth = ["bearer"]

[[endpoints]]
method = "PUT"
path = "/admin/products/{id}/status"
action = "admin_update_product_status"
auth = ["bearer"]

[actions.register]
sql = "INSERT INTO users (name, email, password) VALUES ($1, lower($2), $3) RETURNING id, name, email, role, balance, created_at"
params = ["name", "email", "password"]
hash = ["password"]
result = "one"
status = 201
no_store = true

[actions.login]
sql = "INSERT INTO sessions (token, user_id, expires_at) VALUES ($1, $2, EXTRACT(EPOCH FROM clock_timestamp())::BIGINT + 86400) RETURNING token, expires_at"
params = ["$token", "$owner"]
result = "one"
status = 201
no_store = true

[actions.me]
sql = "SELECT id, name, email, role, balance, created_at FROM users WHERE id = $1"
params = ["$owner"]
result = "one"
no_store = true

[actions.list_products]
sql = "SELECT id, slug, name, description, category, price, active, created_at, updated_at FROM products WHERE active = TRUE ORDER BY id"
result = "many"

[actions.list_transactions]
sql = "SELECT id, external_id, product_id, kind, status, amount, product_name, fulfillment, license_key, processed_at, created_at FROM transactions WHERE user_id = $1 ORDER BY id DESC"
params = ["$owner"]
result = "many"
no_store = true

[actions.create_top_up]
sql = "INSERT INTO transactions (external_id, user_id, kind, status, amount) VALUES ($1, $2, 'top_up', 'confirmed', $3::BIGINT) RETURNING id, external_id, kind, status, amount, processed_at, created_at"
params = ["external_id", "$owner", "amount"]
result = "one"
status = 201
no_store = true

[actions.create_purchase]
sql = "INSERT INTO transactions (external_id, user_id, product_id, kind, status, amount, product_name, fulfillment, license_key) SELECT $1, $2, p.id, 'purchase', 'confirmed', p.price, p.name, p.fulfillment, $3 FROM products AS p WHERE p.id = $4::BIGINT AND p.active = TRUE RETURNING id, external_id, product_id, kind, status, amount, product_name, fulfillment, license_key, processed_at, created_at"
params = ["external_id", "$owner", "$token", "product_id"]
result = "one"
status = 201
no_store = true

[[actions.create_purchase.errors]]
database_message = "insufficient balance"
status = 422
message = "insufficient balance"

[actions.admin_summary]
sql = "SELECT (SELECT COUNT(*)::BIGINT FROM users) AS user_count, (SELECT COUNT(*)::BIGINT FROM users WHERE role = 'customer') AS customer_count, (SELECT COUNT(*)::BIGINT FROM products) AS product_count, (SELECT COUNT(*)::BIGINT FROM transactions) AS transaction_count, (SELECT COALESCE(SUM(balance), 0)::BIGINT FROM users) AS total_balances, (SELECT COALESCE(SUM(amount), 0)::BIGINT FROM transactions WHERE kind = 'top_up' AND status = 'confirmed') AS total_topups, (SELECT COALESCE(SUM(amount), 0)::BIGINT FROM transactions WHERE kind = 'purchase' AND status = 'confirmed') AS total_sales WHERE (SELECT require_admin($1))"
params = ["$owner"]
result = "one"
no_store = true

[actions.admin_users]
sql = "SELECT id, name, email, role, balance, created_at FROM users WHERE (SELECT require_admin($1)) ORDER BY id"
params = ["$owner"]
result = "many"
no_store = true

[actions.admin_transactions]
sql = "SELECT t.id, t.external_id, t.user_id, u.name AS user_name, u.email AS user_email, t.product_id, t.kind, t.status, t.amount, t.product_name, t.fulfillment, t.license_key, t.processed_at, t.created_at FROM transactions AS t JOIN users AS u ON u.id = t.user_id WHERE (SELECT require_admin($1)) ORDER BY t.id DESC"
params = ["$owner"]
result = "many"
no_store = true

[actions.admin_user_transactions]
sql = "SELECT t.id, t.external_id, t.user_id, u.name AS user_name, u.email AS user_email, t.product_id, t.kind, t.status, t.amount, t.product_name, t.fulfillment, t.license_key, t.processed_at, t.created_at FROM transactions AS t JOIN users AS u ON u.id = t.user_id WHERE t.user_id = $1::BIGINT AND (SELECT require_admin($2)) ORDER BY t.id DESC"
params = ["id", "$owner"]
result = "many"
no_store = true

[actions.admin_products]
sql = "SELECT id, slug, name, description, category, price, active, fulfillment, created_at, updated_at FROM products WHERE (SELECT require_admin($1)) ORDER BY id"
params = ["$owner"]
result = "many"
no_store = true

[actions.admin_create_product]
sql = "INSERT INTO products (slug, name, description, category, price, fulfillment) SELECT $1, $2, $3, $4, $5::BIGINT, $6 WHERE (SELECT require_admin($7)) RETURNING id, slug, name, description, category, price, active, fulfillment, created_at, updated_at"
params = ["slug", "name", "description", "category", "price", "fulfillment", "$owner"]
result = "one"
status = 201
no_store = true

[actions.admin_update_product]
sql = "UPDATE products SET slug = $1, name = $2, description = $3, category = $4, price = $5::BIGINT, fulfillment = $6, updated_at = EXTRACT(EPOCH FROM clock_timestamp())::BIGINT WHERE id = $7::BIGINT AND (SELECT require_admin($8)) RETURNING id, slug, name, description, category, price, active, fulfillment, created_at, updated_at"
params = ["slug", "name", "description", "category", "price", "fulfillment", "id", "$owner"]
result = "optional"
no_store = true

[actions.admin_update_product_status]
sql = "UPDATE products SET active = $1::BOOLEAN, updated_at = EXTRACT(EPOCH FROM clock_timestamp())::BIGINT WHERE id = $2::BIGINT AND (SELECT require_admin($3)) RETURNING id, slug, name, description, category, price, active, fulfillment, created_at, updated_at"
params = ["active", "id", "$owner"]
result = "optional"
no_store = true

[[actions.create_top_up.errors]]
database_message = "amount must be positive"
status = 422
message = "amount must be positive"

[[actions.admin_summary.errors]]
database_message = "administrator privileges required"
status = 403
message = "administrator privileges required"

[[actions.admin_users.errors]]
database_message = "administrator privileges required"
status = 403
message = "administrator privileges required"

[[actions.admin_transactions.errors]]
database_message = "administrator privileges required"
status = 403
message = "administrator privileges required"

[[actions.admin_user_transactions.errors]]
database_message = "administrator privileges required"
status = 403
message = "administrator privileges required"

[[actions.admin_products.errors]]
database_message = "administrator privileges required"
status = 403
message = "administrator privileges required"

[[actions.admin_create_product.errors]]
database_message = "administrator privileges required"
status = 403
message = "administrator privileges required"

[[actions.admin_create_product.errors]]
database_message = "invalid product"
status = 422
message = "invalid product"

[[actions.admin_update_product.errors]]
database_message = "administrator privileges required"
status = 403
message = "administrator privileges required"

[[actions.admin_update_product.errors]]
database_message = "invalid product"
status = 422
message = "invalid product"

[[actions.admin_update_product_status.errors]]
database_message = "administrator privileges required"
status = 403
message = "administrator privileges required"
